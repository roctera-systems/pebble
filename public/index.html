<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pebble</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="todo-app">

    <button id="google-login-btn">Google Authentication</button>
    <!-- Main Application Script -->
    <script type="module" src="app.js"></script>

</html>
