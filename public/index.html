<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pebble</title>
    <link rel="stylesheet" href="styles.css" />

    <!-- update the version number as needed -->
    <script defer src="/__/firebase/12.0.0/firebase-app-compat.js"></script>
    <!-- include only the Firebase features as you need -->
    <script defer src="/__/firebase/12.0.0/firebase-auth-compat.js"></script>
    <script
      defer
      src="/__/firebase/12.0.0/firebase-database-compat.js"
    ></script>
    <script
      defer
      src="/__/firebase/12.0.0/firebase-firestore-compat.js"
    ></script>
    <script
      defer
      src="/__/firebase/12.0.0/firebase-functions-compat.js"
    ></script>
    <script
      defer
      src="/__/firebase/12.0.0/firebase-messaging-compat.js"
    ></script>
    <script defer src="/__/firebase/12.0.0/firebase-storage-compat.js"></script>
    <script
      defer
      src="/__/firebase/12.0.0/firebase-analytics-compat.js"
    ></script>
    <script
      defer
      src="/__/firebase/12.0.0/firebase-remote-config-compat.js"
    ></script>
    <script
      defer
      src="/__/firebase/12.0.0/firebase-performance-compat.js"
    ></script>
    <!-- 
      initialize the SDK after all desired features are loaded, set useEmulator to false
      to avoid connecting the SDK to running emulators.
    -->
    <script defer src="/__/firebase/init.js?useEmulator=true"></script>
  </head>
  <body>
    <div class="container">
      <div class="todo-app">
        <h2>
          To-Do List <img src="assets/toDoListIcon.png" alt="To-Do List Icon" />
        </h2>

        <div class="row">
          <input type="text" id="input-box" placeholder="Add your task" />
          <button onclick="addTask()">Add</button>
        </div>

        <ul id="list-container"></ul>
      </div>
    </div>

    <button onclick="google_login()">Google Authentication</button>
    <script src="app.js"></script>
  </body>
</html>
